<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Deep Obsidian Dark Background -->
    <linearGradient id="obsidianBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#090D16" />
    </linearGradient>

    <!-- Electric Mint & Cyan Gradients for Budget Slices -->
    <linearGradient id="mintSlice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="cyanSlice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="glowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- App Icon Squircle Background -->
  <rect width="512" height="512" rx="128" fill="url(#obsidianBg)" />

  <!-- The "Pie Chart / Budget Slice 'F'" Concept -->
  <g filter="url(#glowShadow)">
    <!-- Main Vertical Stem / Solid Pillar (Left side of F) -->
    <rect x="160" y="130" width="70" height="252" rx="35" fill="url(#mintSlice)" />

    <!-- Top Budget Slice (Top bar of F) -->
    <path d="M 250 130 h 65 c 38.6 0 70 31.4 70 70 v 0 c 0 38.6 -31.4 70 -70 70 h -65 v -140 z" fill="url(#cyanSlice)" />

    <!-- Middle Budget Slice (Middle bar of F) -->
    <path d="M 250 242 h 35 c 38.6 0 70 31.4 70 70 v 0 c 0 38.6 -31.4 70 -70 70 h -35 v -140 z" fill="url(#mintSlice)" />
  </g>
</svg>
